name: Build Android APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_apk:
    name: Compile Android APK (Cloud)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './web-app/package-lock.json'

      - name: Install Frontend Dependencies
        working-directory: ./web-app
        run: npm install

      - name: Build Static App Bundle
        working-directory: ./web-app
        run: npm run build

      - name: Sync native Android container
        working-directory: ./web-app
        run: npx cap sync android

      - name: Set up Java SDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Ensure gradlew is executable
        working-directory: ./web-app/android
        run: chmod +x ./gradlew

      - name: Build Android Debug APK
        working-directory: ./web-app/android
        run: ./gradlew assembleDebug

      - name: Publish APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: hellopay-android-app
          path: web-app/android/app/build/outputs/apk/debug/app-debug.apk
